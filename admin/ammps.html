<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Alertes Réglementaires — AMMPS · Blink</title>
<script src="/admin/auth-guard.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F4F7FB;--card:#fff;--surface:#F8FAFC;
  --purple:#7B1FA2;--purple-d:#4A148C;--purple-soft:rgba(123,31,162,.07);--purple-mid:rgba(123,31,162,.16);
  --green:#1a6640;--text:#1A2332;--muted:#64748B;--soft:#94A3B8;--border:#E2E8F0;
  --shadow:0 4px 20px rgba(15,23,42,.07);--r:14px;--r-sm:9px
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.55;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--shadow);position:sticky;top:0;z-index:50}
.hdr-left{display:flex;align-items:center;gap:14px}
.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--purple),var(--purple-d));display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:#fff;flex-shrink:0}
.hdr-brand{font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;color:var(--text)}
.hdr-brand span{color:var(--purple)}
.badge-ammps{background:var(--purple-soft);color:var(--purple);font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;letter-spacing:.04em;border:1.5px solid var(--purple-mid)}
.hdr-right{display:flex;align-items:center;gap:12px}
.user-label{font-size:13px;color:var(--muted);font-weight:500}
.btn-logout{background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit;transition:all .15s}
.btn-logout:hover{color:var(--text);border-color:#c4cdd8}

/* Toolbar */
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.toolbar-left{display:flex;align-items:center;gap:10px;flex:1}
.toolbar-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;color:var(--text)}
.badge-count{display:inline-flex;align-items:center;justify-content:center;background:var(--purple);color:#fff;border-radius:999px;font-size:11px;font-weight:800;padding:2px 8px}
.filter-tabs{display:flex;gap:5px}
.ftab{padding:7px 16px;border-radius:999px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit}
.ftab.active{background:var(--purple-soft);border-color:var(--purple-mid);color:var(--purple)}
.ftab:hover:not(.active){background:var(--surface)}
.btn-export{background:var(--purple-soft);border:1.5px solid var(--purple-mid);color:var(--purple);border-radius:9px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;white-space:nowrap}
.btn-export:hover{background:var(--purple-mid)}

/* Body */
.body{padding:24px 28px 60px;flex:1}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;box-shadow:var(--shadow)}
.stat-num{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;color:var(--purple);line-height:1}
.stat-num.orange{color:#D84315}
.stat-num.green{color:#1B5E20}
.stat-num.blue{color:#1A237E}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:5px;font-weight:500}

/* Table card */
.table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--surface);border-bottom:2px solid var(--border)}
th{padding:13px 18px;text-align:left;font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#FAFBFD}
td{padding:14px 18px;vertical-align:top}
.td-date{white-space:nowrap;color:var(--muted);font-size:13px;font-weight:500}
.td-product-name{font-size:14px;font-weight:700;color:var(--text)}
.td-ref{font-size:12px;color:var(--soft);margin-top:3px;font-family:monospace}
.td-org{font-size:13px;color:var(--muted)}
.td-zone{font-size:13px;color:var(--muted)}
.td-comment{font-size:13px;color:var(--text);max-width:280px;line-height:1.5}
.td-comment.empty{color:var(--soft);font-style:italic}
.td-segment{font-size:11px;color:var(--soft);margin-top:5px}

/* Status */
.s-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap}
.s-dot{width:6px;height:6px;border-radius:999px;background:currentColor;flex-shrink:0}
.s-pending{background:rgba(255,112,67,.1);color:#BF360C}
.s-approved{background:rgba(27,94,32,.1);color:#1B5E20}
.s-sent{background:rgba(26,35,126,.1);color:#1A237E}
.s-draft{background:rgba(148,163,184,.12);color:#4A5568}

/* Empty / loading */
.state-box{text-align:center;padding:64px 24px}
.state-icon{font-size:42px;margin-bottom:14px}
.state-msg{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;margin-bottom:6px}
.state-sub{font-size:14px;color:var(--muted)}

/* Footer */
.ftr{padding:14px 28px;border-top:1px solid var(--border);font-size:12px;color:var(--soft);background:#fff;text-align:center;margin-top:auto}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="logo">B</div>
    <span class="hdr-brand">Blink <span>Alertes</span></span>
    <span class="badge-ammps">📘 AMMPS — Autorité Sanitaire</span>
  </div>
  <div class="hdr-right">
    <span class="user-label" id="userLabel"></span>
    <button class="btn-logout" onclick="logout()">⬅ Déconnexion</button>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-left">
    <span class="toolbar-title">Alertes réglementaires</span>
    <span class="badge-count" id="totalCount">—</span>
  </div>
  <div class="filter-tabs">
    <button class="ftab active" onclick="setFilter(this,'')">Toutes</button>
    <button class="ftab" onclick="setFilter(this,'pending_approval')">En attente</button>
    <button class="ftab" onclick="setFilter(this,'approved')">Approuvées</button>
    <button class="ftab" onclick="setFilter(this,'sent')">Envoyées</button>
  </div>
  <button class="btn-export" onclick="exportCsv()">⬇ Exporter CSV</button>
</div>

<div class="body">
  <div class="stats" id="statsBar"></div>

  <div class="table-card" id="tableCard">
    <div class="state-box" id="stateBox">
      <div class="state-icon">⏳</div>
      <div class="state-msg">Chargement…</div>
    </div>
    <table id="alertsTable" style="display:none">
      <thead>
        <tr>
          <th>Date</th>
          <th>Produit</th>
          <th>Fournisseur</th>
          <th>Zone géographique</th>
          <th>Statut</th>
          <th>Commentaire / Contenu</th>
        </tr>
      </thead>
      <tbody id="alertsTbody"></tbody>
    </table>
  </div>
</div>

<footer class="ftr">
  Portail AMMPS — Blink Pharma · Accès lecture seule · Données confidentielles à usage réglementaire
</footer>

<script>
let allAlerts = [];
let currentFilter = '';

const STATUS_MAP = {
  pending_approval: { label:'En attente',  cls:'s-pending' },
  approved:         { label:'Approuvée',    cls:'s-approved' },
  sent:             { label:'Envoyée',      cls:'s-sent' },
  draft:            { label:'Brouillon',    cls:'s-draft' },
};

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtDate(iso){
  if(!iso) return '—';
  return new Date(iso).toLocaleDateString('fr-MA',{day:'2-digit',month:'short',year:'numeric'});
}

function statusBadge(s){
  const m = STATUS_MAP[s] || {label:s,cls:'s-draft'};
  return `<span class="s-badge ${m.cls}"><span class="s-dot"></span>${m.label}</span>`;
}

function renderStats(alerts){
  const total=alerts.length, pending=alerts.filter(a=>a.status==='pending_approval').length,
        approved=alerts.filter(a=>a.status==='approved').length, sent=alerts.filter(a=>a.status==='sent').length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Total alertes réglementaires</div></div>
    <div class="stat-card"><div class="stat-num orange">${pending}</div><div class="stat-lbl">En attente d'approbation</div></div>
    <div class="stat-card"><div class="stat-num green">${approved}</div><div class="stat-lbl">Approuvées</div></div>
    <div class="stat-card"><div class="stat-num blue">${sent}</div><div class="stat-lbl">Envoyées aux pharmaciens</div></div>
  `;
}

function renderTable(alerts){
  document.getElementById('totalCount').textContent=alerts.length;
  const stateBox=document.getElementById('stateBox');
  const table=document.getElementById('alertsTable');
  if(!alerts.length){
    table.style.display='none';
    stateBox.innerHTML=`<div class="state-icon">📋</div><div class="state-msg">Aucune alerte réglementaire</div><div class="state-sub">Les alertes « Info réglementaire » apparaîtront ici dès leur création.</div>`;
    stateBox.style.display='block';
    return;
  }
  stateBox.style.display='none';
  table.style.display='table';
  document.getElementById('alertsTbody').innerHTML=alerts.map(a=>`
    <tr>
      <td class="td-date">${fmtDate(a.created_at)}</td>
      <td>
        <div class="td-product-name">${esc(a.product_name||'—')}</div>
        ${a.product_id_medindex?`<div class="td-ref">${esc(a.product_id_medindex)}</div>`:''}
      </td>
      <td class="td-org">${esc(a.source_id||'—')}</td>
      <td class="td-zone">${esc(a.geographic_zone||'Toutes régions')}</td>
      <td>${statusBadge(a.status)}</td>
      <td>
        ${a.comment
          ?`<div class="td-comment">${esc(a.comment)}</div>`
          :`<div class="td-comment empty">Aucun commentaire</div>`}
        ${a.target_segment&&a.target_segment!=='all'?`<div class="td-segment">Cible : ${esc(a.target_segment)}</div>`:''}
      </td>
    </tr>
  `).join('');
}

function setFilter(btn,status){
  currentFilter=status;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(status ? allAlerts.filter(a=>a.status===status) : allAlerts);
}

function exportCsv(){
  const data=currentFilter?allAlerts.filter(a=>a.status===currentFilter):allAlerts;
  if(!data.length) return;
  const hdr=['Date','Produit','Référence Medindex','Fournisseur','Zone','Statut','Commentaire','Cible'];
  const rows=data.map(a=>[
    fmtDate(a.created_at),a.product_name||'',a.product_id_medindex||'',
    a.source_id||'',a.geographic_zone||'Toutes régions',a.status||'',a.comment||'',a.target_segment||''
  ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv=[hdr.join(','),...rows].join('\n');
  const url=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'}));
  const el=document.createElement('a');
  el.href=url; el.download=`alertes-reglementaires-${new Date().toISOString().slice(0,10)}.csv`;
  el.click(); URL.revokeObjectURL(url);
}

async function load(){
  try{
    const res=await fetch('/admin/api/ammps/alerts');
    if(!res.ok) throw new Error('Erreur '+res.status);
    allAlerts=await res.json();
    renderStats(allAlerts);
    renderTable(allAlerts);
  }catch(e){
    document.getElementById('stateBox').innerHTML=`<div class="state-icon">⚠️</div><div class="state-msg">Erreur de chargement</div><div class="state-sub">${esc(e.message)}</div>`;
  }
}

function logout(){
  localStorage.removeItem('admin_token'); localStorage.removeItem('admin_user');
  window.location.href='/admin/login';
}

(function(){
  try{
    const u=JSON.parse(localStorage.getItem('admin_user')||'{}');
    if(u.name||u.email) document.getElementById('userLabel').textContent=u.name||u.email;
  }catch(_){}
})();

load();
</script>
</body>
</html>
