<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FSE CNSS — Blink Premium</title>
  <meta name="description" content="Posez vos questions sur la Feuille de Soins Électronique CNSS — réponse instantanée par IA." />
  <meta name="theme-color" content="#1A237E" />
  <link rel="stylesheet" href="blink.css" />
  <style>
    body { background: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ─── BACK BAR ─── */
    .back-bar {
      flex-shrink: 0;
      background: rgba(255,255,255,0.97); backdrop-filter: blur(10px);
      padding: 0.75rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(0,0,0,0.06); z-index: 50;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.875rem; font-weight: 600; color: #3F51B5;
      background: none; border: none; cursor: pointer; padding: 0;
    }
    .back-bar-title { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.875rem; color: #1E2A3A; }
    .share-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: white; border: 1px solid #E2E8F0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #64748B;
    }

    /* ─── HERO ─── */
    .page-hero {
      flex-shrink: 0;
      background: linear-gradient(135deg, #1A237E 0%, #3F51B5 60%, #26C6DA 100%);
      padding: 1.5rem 1.25rem 1.75rem; color: white; overflow: hidden; position: relative;
    }
    .page-hero::before {
      content: ''; position: absolute; right: -40px; top: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-icon {
      position: relative; z-index: 1;
      display: inline-flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border-radius: 12px;
      background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);
      font-size: 1.375rem; margin-bottom: 0.75rem;
    }
    .page-hero h1 {
      position: relative; z-index: 1;
      font-family: 'Nunito', sans-serif; font-size: 1.625rem; font-weight: 900;
      line-height: 1.1; margin: 0 0 0.5rem; letter-spacing: -0.02em;
    }
    .page-hero p { position: relative; z-index: 1; font-size: 0.875rem; color: rgba(255,255,255,0.85); margin: 0 0 1rem; line-height: 1.5; }
    .example-chips { display: flex; gap: 6px; flex-wrap: wrap; position: relative; z-index: 1; }
    .example-chip {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
      border-radius: 100px; padding: 0.3rem 0.75rem;
      font-size: 0.75rem; font-weight: 600; color: white;
      cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    .example-chip:hover { background: rgba(255,255,255,0.25); }

    /* ─── CHAT AREA ─── */
    .chat-area {
      flex: 1; overflow-y: auto; padding: 1rem 1.25rem 0.5rem;
      display: flex; flex-direction: column; gap: 0.875rem;
      background: #fff;
      -webkit-overflow-scrolling: touch;
    }
    .chat-empty {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; gap: 0.625rem; padding: 1.5rem;
      color: #64748B;
    }
    .chat-empty-icon {
      width: 52px; height: 52px; border-radius: 16px;
      background: linear-gradient(135deg, #E8EAF6, #C5CAE9);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
    }
    .chat-empty p { font-size: 0.9rem; line-height: 1.55; max-width: 240px; font-weight: 500; color: #475569; margin: 0; }

    .msg-row { display: flex; flex-direction: column; gap: 4px; }
    .msg-row.user { align-items: flex-end; }
    .msg-row.bot  { align-items: flex-start; }

    .msg-bubble {
      max-width: 88%; padding: 0.75rem 1rem; border-radius: 18px;
      font-size: 0.9rem; line-height: 1.6;
    }
    .msg-row.user .msg-bubble {
      background: #3F51B5; color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-row.bot .msg-bubble {
      background: white; color: #2C3E50;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border-left: 3px solid #3F51B5;
      white-space: pre-wrap;
    }
    .msg-time { font-size: 0.6875rem; color: #94A3B8; padding: 0 4px; }

    /* Typing indicator */
    .typing-dots { display: flex; gap: 5px; padding: 0.875rem 1rem; }
    .typing-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #94A3B8;
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ─── INPUT BAR ─── */
    .ask-bar {
      flex-shrink: 0;
      padding: 0.75rem 1rem 0.875rem; background: white;
      border-top: 1.5px solid #E8EAF6;
      box-shadow: 0 -4px 20px rgba(63,81,181,0.06);
      display: flex; gap: 8px; align-items: flex-end;
    }
    .ask-input {
      flex: 1; border: 2px solid #C5CAE9; border-radius: 22px;
      padding: 0.7rem 1.125rem; font-family: 'DM Sans', sans-serif;
      font-size: 0.9375rem; color: #1E293B; background: #F8F9FF;
      resize: none; outline: none; max-height: 120px; min-height: 44px;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      line-height: 1.5;
    }
    .ask-input:focus { border-color: #3F51B5; background: white; box-shadow: 0 0 0 3px rgba(63,81,181,0.10); }
    .ask-input::placeholder { color: #94A3B8; font-weight: 400; }
    .send-btn {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: #3F51B5; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; color: white;
    }
    .send-btn:hover { background: #303F9F; transform: scale(1.05); }
    .send-btn:disabled { background: #CBD5E1; cursor: not-allowed; transform: none; }

    /* Desktop */
    @media (min-width: 768px) {
      body { max-width: 640px; margin: 0 auto; box-shadow: 0 0 40px rgba(0,0,0,0.08); }
      .page-hero { padding: 2rem 2rem 2.25rem; }
      .page-hero h1 { font-size: 2rem; }
      .chat-area { padding: 1.25rem 1.5rem 0.75rem; }
      .ask-bar { padding: 1rem 1.25rem; }
    }

    /* RTL support */
    html[dir="rtl"] .back-btn { flex-direction: row-reverse; }
    html[dir="rtl"] .msg-row.user { align-items: flex-start; }
    html[dir="rtl"] .msg-row.bot  { align-items: flex-end; }
    html[dir="rtl"] .msg-row.user .msg-bubble { border-bottom-right-radius: 18px; border-bottom-left-radius: 4px; }
    html[dir="rtl"] .msg-row.bot .msg-bubble  { border-bottom-left-radius: 18px; border-bottom-right-radius: 4px; border-left: none; border-right: 3px solid #3F51B5; }
  </style>
</head>
<body>
<script src="assets/logo-data.js"></script>
<script src="blink-components.js"></script>

<script>
// ─── Language setup ───────────────────────────────────────────────────────────
const _params = new URLSearchParams(window.location.search);
const _stored = localStorage.getItem('blink_lang');
let LANG = _params.get('lang') || _stored || 'fr';
if (!['fr','ar','es','ru'].includes(LANG)) LANG = 'fr';
localStorage.setItem('blink_lang', LANG);
if (LANG === 'ar') { document.documentElement.setAttribute('dir','rtl'); document.documentElement.lang = 'ar'; }

const T = {
  fr: {
    title: 'FSE CNSS', subtitle: 'Soins Électroniques',
    hero_title: 'FSE CNSS', hero_sub: 'Posez vos questions sur la Feuille de Soins Électronique — réponse instantanée par IA.',
    back: 'Retour', placeholder: 'Posez votre question sur la FSE…',
    empty: 'Posez votre première question sur la FSE CNSS.',
    examples: ['Comment fonctionne la facturation FSE ?', 'Quels médicaments sont pris en charge ?', 'Délai de remboursement CNSS ?'],
    thinking: 'Analyse en cours…', error: 'Erreur réseau. Réessayez.',
  },
  ar: {
    title: 'FSE CNSS', subtitle: 'الوصفة الإلكترونية',
    hero_title: 'FSE CNSS', hero_sub: 'اطرح أسئلتك حول الوصفة الإلكترونية CNSS — إجابة فورية بالذكاء الاصطناعي.',
    back: 'رجوع', placeholder: 'اطرح سؤالك حول الوصفة الإلكترونية…',
    empty: 'اطرح سؤالك الأول حول الوصفة الإلكترونية CNSS.',
    examples: ['كيف تعمل فوترة FSE؟', 'ما هي الأدوية المشمولة؟', 'أجل استرداد CNSS؟'],
    thinking: 'جارٍ التحليل…', error: 'خطأ في الشبكة. أعد المحاولة.',
  },
  es: {
    title: 'FSE CNSS', subtitle: 'Hoja de Soins Electrónica',
    hero_title: 'FSE CNSS', hero_sub: 'Plantea tus preguntas sobre la Hoja de Cuidados Electrónica — respuesta instantánea por IA.',
    back: 'Volver', placeholder: 'Haga su pregunta sobre la FSE…',
    empty: 'Haga su primera pregunta sobre la FSE CNSS.',
    examples: ['¿Cómo funciona la facturación FSE?', '¿Qué medicamentos están cubiertos?', '¿Plazo de reembolso CNSS?'],
    thinking: 'Analizando…', error: 'Error de red. Inténtelo de nuevo.',
  },
  ru: {
    title: 'FSE CNSS', subtitle: 'Электронный лист лечения',
    hero_title: 'FSE CNSS', hero_sub: 'Задайте вопросы о Электронном листе лечения CNSS — мгновенный ответ ИИ.',
    back: 'Назад', placeholder: 'Задайте вопрос о FSE…',
    empty: 'Задайте первый вопрос о FSE CNSS.',
    examples: ['Как работает выставление счетов FSE?', 'Какие лекарства покрываются?', 'Срок возмещения CNSS?'],
    thinking: 'Анализ…', error: 'Ошибка сети. Попробуйте снова.',
  },
}[LANG];

document.title = `${T.hero_title} — Blink Premium`;
</script>

<!-- BACK BAR -->
<div class="back-bar">
  <button class="back-btn" onclick="history.length>1?history.back():location.href='/'">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg>
    <span id="backLabel"></span>
  </button>
  <div class="back-bar-title" id="barTitle"></div>
  <button class="share-btn" id="shareBtn" aria-label="Partager">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
  </button>
</div>

<!-- HERO -->
<div class="page-hero">
  <div class="hero-icon">📋</div>
  <h1 id="heroTitle"></h1>
  <p id="heroSub"></p>
  <div class="example-chips" id="exampleChips"></div>
</div>

<!-- CHAT AREA -->
<div class="chat-area" id="chatArea">
  <div class="chat-empty" id="chatEmpty">
    <div class="chat-empty-icon">💬</div>
    <p id="emptyText"></p>
  </div>
</div>

<!-- INPUT BAR -->
<div class="ask-bar">
  <textarea class="ask-input" id="askInput" rows="1" id="askInput"></textarea>
  <button class="send-btn" id="sendBtn" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9"/></svg>
  </button>
</div>

<script>
// ─── Init UI text ─────────────────────────────────────────────────────────────
document.getElementById('backLabel').textContent  = T.back;
document.getElementById('barTitle').textContent   = T.title;
document.getElementById('heroTitle').textContent  = T.hero_title;
document.getElementById('heroSub').textContent    = T.hero_sub;
document.getElementById('emptyText').textContent  = T.empty;
document.getElementById('askInput').placeholder   = T.placeholder;

// Example chips
const chipsEl = document.getElementById('exampleChips');
T.examples.forEach(ex => {
  const chip = document.createElement('button');
  chip.className = 'example-chip';
  chip.textContent = ex;
  chip.addEventListener('click', () => { document.getElementById('askInput').value = ex; checkInput(); sendQuestion(); });
  chipsEl.appendChild(chip);
});

// Share
document.getElementById('shareBtn').addEventListener('click', async () => {
  if (navigator.share) { try { await navigator.share({ title: T.title, url: location.href }); } catch(e) {} }
  else navigator.clipboard?.writeText(location.href);
});

// ─── Chat logic ───────────────────────────────────────────────────────────────
const chatArea = document.getElementById('chatArea');
const chatEmpty = document.getElementById('chatEmpty');
const askInput  = document.getElementById('askInput');
const sendBtn   = document.getElementById('sendBtn');

function checkInput() {
  sendBtn.disabled = askInput.value.trim().length < 3;
}
askInput.addEventListener('input', () => {
  checkInput();
  askInput.style.height = 'auto';
  askInput.style.height = Math.min(askInput.scrollHeight, 120) + 'px';
});
askInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendQuestion(); }
});
sendBtn.addEventListener('click', sendQuestion);

function now() {
  return new Date().toLocaleTimeString(LANG === 'ar' ? 'ar-MA' : LANG === 'ru' ? 'ru-RU' : LANG === 'es' ? 'es-MA' : 'fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function appendMsg(text, side) {
  if (chatEmpty.style.display !== 'none') chatEmpty.style.display = 'none';
  const row = document.createElement('div');
  row.className = `msg-row ${side}`;
  row.innerHTML = `<div class="msg-bubble">${side === 'bot' ? escapeHtml(text) : text}</div><span class="msg-time">${now()}</span>`;
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
  return row;
}

function appendTyping() {
  if (chatEmpty.style.display !== 'none') chatEmpty.style.display = 'none';
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = `<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  row.appendChild(bubble);
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
  return row;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendQuestion() {
  const q = askInput.value.trim();
  if (q.length < 3) return;

  askInput.value = '';
  askInput.style.height = 'auto';
  sendBtn.disabled = true;
  askInput.disabled = true;

  appendMsg(escapeHtml(q), 'user');
  const typingRow = appendTyping();

  try {
    const resp = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rubrique: 'fse', question: q, lang: LANG }),
    });
    const data = await resp.json();
    typingRow.remove();
    appendMsg(data.answer || data.error || T.error, 'bot');
  } catch(e) {
    typingRow.remove();
    appendMsg(T.error, 'bot');
  }

  askInput.disabled = false;
  askInput.focus();
  checkInput();
}
</script>

<script>
if (window.innerWidth >= 900) { injectNavbar('fse'); injectFooter(); }
</script>
</body>
</html>
