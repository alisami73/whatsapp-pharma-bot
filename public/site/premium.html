    icon: icons[index],
    body: extra[index].body,
    details: extra[index].details,
  }));

  document.documentElement.lang = lang;
  document.body.dir = t.dir || 'ltr';

  const setText = (id, value) => {
    const el = document.getElementById(id);
    if (el) el.textContent = value;
  };

  document.getElementById('docsToolbarBtn').textContent = copy.toolbarSections;
  document.getElementById('docsToolbarCta').textContent = t.nav_cta;
  document.getElementById('docsToolbarCta').href = lq('contact.html');
  setText('docsSidebarEyebrow', copy.guideEyebrow);
  setText('docsSidebarTitle', copy.guideTitle);
  setText('docsSidebarIntro', copy.guideIntro);
  document.getElementById('docsSidebarCta').textContent = t.nav_cta;
  document.getElementById('docsSidebarCta').href = lq('contact.html');
  document.getElementById('docsSidebarWhatsapp').textContent = copy.whatsappLabel;
  setText('premLabel', t.prem_label);
  document.getElementById('premH1').innerHTML = t.prem_h1;
  setText('premSub', t.prem_sub);
  document.getElementById('premHeroCta').textContent = t.feat_btn1;
  document.getElementById('premHeroCta').href = lq('contact.html');
  document.getElementById('premHeroSecondary').textContent = copy.heroSecondary;
  setText('docsStat1Value', copy.stat1Value);
  setText('docsStat1Text', copy.stat1Text);
  setText('docsStat2Value', copy.stat2Value);
  setText('docsStat2Text', copy.stat2Text);
  setText('docsNoteTitle', copy.noteTitle);
  const noteList = document.getElementById('docsNoteList');
  copy.noteItems.forEach((item) => {
    const li = document.createElement('li');
    li.textContent = item;
    noteList.appendChild(li);
  });
  setText('premCtaLabel', t.prem_cta_label);
  setText('premCtaH2', t.prem_cta_h2);
  setText('premCtaP', t.prem_cta_p);
  document.getElementById('premCtaBtn').textContent = t.cta_btn;
  document.getElementById('premCtaBtn').href = lq('contact.html');
  document.getElementById('premCtaWhatsapp').textContent = copy.whatsappLabel;
  setText('docsTocKicker', copy.tocKicker);
  setText('docsTocIntro', copy.tocIntro);
  setText('docsTocHelperTitle', copy.tocHelperTitle);
  setText('docsTocHelperText', copy.tocHelperText);
  setText('docsDrawerTitle', copy.drawerTitle);
  document.getElementById('docsDrawerCta').textContent = t.nav_cta;
  document.getElementById('docsDrawerCta').href = lq('contact.html');
  document.getElementById('docsDrawerWhatsapp').textContent = copy.whatsappLabel;

  const anchorLinks = document.getElementById('anchorLinks');
  FEATURES.forEach((feature, index) => {
    const link = document.createElement('a');
    link.href = `#${feature.anchor}`;
    link.className = 'docs-chip';
    link.innerHTML = `<span style="color:${feature.color};font-weight:900;">${String(index + 1).padStart(2, '0')}</span> ${feature.title}`;
    anchorLinks.appendChild(link);
  });

  const container = document.getElementById('featureSections');
  FEATURES.forEach((feature, index) => {
    const section = document.createElement('section');
    section.className = 'docs-section fade-up';
    section.id = feature.anchor;
    section.dataset.docsSection = '';
    section.dataset.docsTitle = feature.title;
    section.style.setProperty('--feat-color', feature.color);

    const detailsHTML = feature.details.map((detail) => `
      <li>
        <span class="docs-feature-check">✓</span>
        <span>${detail}</span>
      </li>
    `).join('');

    section.innerHTML = `
      <div class="docs-section-grid${index % 2 === 1 ? ' is-reverse' : ''}">
        <div class="docs-section-content">
          <div class="docs-section-meta">
            <span class="docs-section-index">${String(index + 1).padStart(2, '0')}</span>
            <span class="docs-section-kicker">${feature.title}</span>
          </div>
          <h2>${feature.title}</h2>
          <p>${feature.body}</p>
          <ul class="docs-feature-list">${detailsHTML}</ul>
          <div class="docs-section-actions">
            <a href="${lq('contact.html')}" class="btn btn-primary">${t.feat_btn1}</a>
            <a href="${lq('contact.html', feature.anchor)}" class="btn btn-outline">${t.feat_btn2}</a>
          </div>
        </div>
        <div class="docs-section-media">
          <span class="docs-section-badge" aria-hidden="true">${feature.icon}</span>
          <div class="docs-media-frame">
            <div class="docs-media-header">
              <span class="docs-media-dot" style="background:${feature.color};"></span>
              <span class="docs-media-dot" style="background:color-mix(in srgb, ${feature.color} 40%, #dbe4ee);"></span>
              <span class="docs-media-title">${feature.title}</span>
            </div>
            <img src="${BASE}${feature.media}" alt="Blink Premium — ${feature.title}" onerror="this.style.display='none';this.nextElementSibling.hidden=false;" />
            <div class="docs-media-placeholder" hidden>
              <strong>${feature.icon}</strong>
              <span>${feature.title}</span>
            </div>
          </div>
        </div>
      </div>
    `;

    container.appendChild(section);
  });

  if (typeof initDocsLayout === 'function') {
    initDocsLayout({ rootSelector: '.docs-page' });
  }
  if (typeof initScrollAnimations === 'function') {
    initScrollAnimations();
  }
  </script>

  <script>injectFooter();</script>
</body>
</html>
