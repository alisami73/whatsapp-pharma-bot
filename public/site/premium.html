<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fonctionnalités — Blink Premium</title>
  <meta name="description" content="Découvrez les 8 modules clés de Blink Premium : stocks, inventaire mobile, scan intelligent, achats groupés et plus." />
  <link rel="stylesheet" href="blink.css" />
  <style>
    /* ─── PAGE HERO ─── */
    .page-hero {
      background: linear-gradient(135deg, #F0F2F8 0%, #ffffff 100%);
      padding: 5rem 2rem 4rem;
      text-align: center;
      border-bottom: 1px solid var(--blink-border);
    }
    .page-hero h1 { font-size: clamp(2rem, 4vw, 3rem); font-weight: 900; margin-bottom: 0.875rem; }
    .page-hero p { font-size: 1.0625rem; color: #64748B; max-width: 560px; margin: 0 auto; }
    .page-hero .anchor-links {
      display: flex; flex-wrap: wrap; gap: 0.625rem; justify-content: center;
      margin-top: 2.5rem;
    }
    .anchor-link {
      padding: 0.4rem 1rem; border-radius: 100px;
      font-size: 0.8125rem; font-weight: 600;
      background: white; border: 1.5px solid var(--blink-border);
      color: var(--blink-text); transition: all 0.2s; cursor: pointer;
    }
    .anchor-link:hover {
      border-color: var(--ac);
      color: var(--ac);
      background: color-mix(in srgb, var(--ac) 8%, white);
    }

    /* ─── FEATURE SECTIONS ─── */
    .feature-section {
      padding: 6rem 2rem;
      border-bottom: 1px solid var(--blink-border);
    }
    .feature-section:nth-child(odd) { background: white; }
    .feature-section:nth-child(even) { background: var(--blink-bg); }

    .feature-inner {
      max-width: 1100px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 5rem;
    }
    .feature-section.flip .feature-inner { direction: rtl; }
    .feature-section.flip .feature-inner > * { direction: ltr; }

    .feature-tag {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--feat-color); margin-bottom: 1rem;
    }
    .feature-tag::before {
      content: ''; width: 8px; height: 8px; border-radius: 50%;
      background: var(--feat-color);
    }
    .feature-content h2 {
      font-size: clamp(1.625rem, 2.5vw, 2.25rem); font-weight: 800;
      margin-bottom: 1.125rem; line-height: 1.18;
    }
    .feature-content h2 span { color: var(--feat-color); }
    .feature-content p { font-size: 1rem; color: #64748B; line-height: 1.75; margin-bottom: 1.75rem; }
    .feature-actions { display: flex; gap: 0.875rem; flex-wrap: wrap; }
    .feat-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0.6rem 1.4rem; border-radius: 100px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
      border: 2px solid transparent;
    }
    .feat-btn-primary {
      background: var(--feat-color); color: white;
    }
    .feat-btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .feat-btn-secondary {
      background: transparent; border-color: var(--blink-border); color: var(--blink-text);
    }
    .feat-btn-secondary:hover { border-color: var(--feat-color); color: var(--feat-color); }

    /* Feature image */
    .feature-media { position: relative; }
    .feature-card-frame {
      background: white; border-radius: 24px;
      box-shadow: 0 16px 64px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    .feature-card-header {
      padding: 1rem 1.25rem;
      display: flex; align-items: center; gap: 0.75rem;
      border-bottom: 1px solid var(--blink-border);
    }
    .feature-card-dot { width: 10px; height: 10px; border-radius: 50%; }
    .feature-card-header .title {
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.9rem;
      color: var(--feat-color);
    }
    .feature-card-frame img {
      width: 100%; display: block;
    }
    .feature-card-placeholder {
      width: 100%; aspect-ratio: 4/3;
      background: linear-gradient(160deg, var(--blink-bg) 0%, #e8eaf6 100%);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1rem; padding: 2.5rem;
      font-family: 'Courier New', monospace; font-size: 0.75rem;
      color: var(--blink-muted); text-align: center;
    }
    .feature-card-placeholder .ph-icon { font-size: 3rem; opacity: 0.4; }

    /* Number badge */
    .feature-number {
      position: absolute; top: -16px; left: -16px;
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--feat-color); color: white;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.0625rem;
      box-shadow: 0 4px 16px color-mix(in srgb, var(--feat-color) 40%, transparent);
    }

    /* ─── CTA ─── */
    .cta-banner {
      padding: 6rem 2rem;
      background: linear-gradient(135deg, #43a047 0%, #4CAF50 60%, #26C6DA 100%);
      text-align: center; color: white;
    }
    .cta-banner h2 { font-size: clamp(1.75rem, 3.5vw, 2.5rem); font-weight: 900; color: white; margin-bottom: 0.875rem; }
    .cta-banner p { font-size: 1.0625rem; opacity: 0.9; margin-bottom: 2rem; }

    @media (max-width: 900px) {
      .feature-inner { grid-template-columns: 1fr; gap: 2.5rem; }
      .feature-section.flip .feature-inner { direction: ltr; }
      .feature-section { padding: 4rem 1.5rem; }
    }
  </style>
</head>
<body>
  <script src="assets/logo-data.js"></script>
  <script src="i18n.js"></script>
  <script src="blink-components.js"></script>
  <script>injectNavbar('premium');</script>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <p class="section-label" id="premLabel" style="justify-content:center;display:flex;"></p>
    <h1 id="premH1"></h1>
    <p id="premSub"></p>
    <div class="anchor-links" id="anchorLinks"></div>
  </div>

  <!-- FEATURE SECTIONS -->
  <div id="featureSections"></div>

  <!-- CTA -->
  <section class="cta-banner">
    <p class="section-label" id="premCtaLabel" style="color:rgba(255,255,255,0.7);justify-content:center;display:flex;margin-bottom:0.75rem;"></p>
    <h2 class="fade-up" id="premCtaH2"></h2>
    <p class="fade-up" id="premCtaP"></p>
    <a id="premCtaBtn" href="contact.html" class="btn btn-white btn-lg fade-up"></a>
  </section>

  <script>
  const BASE = "https://whatsapp-pharma-bot-production.up.railway.app/public/carousel/";
  const t = BI18N.t;
  const lang = BI18N.lang;
  const lq = (p, hash) => (lang === 'fr' ? p : p + '?lang=' + lang) + (hash ? '#' + hash : '');

  // Static text
  document.getElementById('premLabel').textContent   = t.prem_label;
  document.getElementById('premH1').innerHTML        = t.prem_h1;
  document.getElementById('premSub').textContent     = t.prem_sub;
  document.getElementById('premCtaLabel').textContent = t.prem_cta_label;
  document.getElementById('premCtaH2').textContent   = t.prem_cta_h2;
  document.getElementById('premCtaP').textContent    = t.prem_cta_p;
  document.getElementById('premCtaBtn').textContent  = t.cta_btn;
  document.getElementById('premCtaBtn').href         = lq('contact.html');

  // Extended per-language feature data (body + details)
  const FEAT_EXTRA = {
    fr: [
      { body: "Passez à Blink Premium sans perdre votre historique. Nous importons vos clients, vos fournisseurs et toutes vos données avec un accompagnement personnalisé. La transition est fluide, rapide, et sans interruption de votre activité.", details: ["Import clients & fournisseurs", "Historique complet préservé", "Accompagnement Blink dédié", "Migration en quelques jours"] },
      { body: "Une interface pensée pour les pharmaciens, pas pour les informaticiens. Votre équipe sera opérationnelle dès le premier jour. Navigation claire, actions directes, et formation intégrée.", details: ["Interface intuitive", "Formation en ligne incluse", "Support réactif 7j/7", "Démarrage en 48h"] },
      { body: "Visualisez vos stocks en temps réel et identifiez immédiatement les écarts. Blink Premium synchronise automatiquement vos entrées et sorties, génère des alertes de réapprovisionnement.", details: ["Stock en temps réel", "Alertes de rupture", "Historique des mouvements", "Rapports automatisés"] },
      { body: "Réalisez vos inventaires sans rester derrière votre comptoir. Avec l'application mobile Blink, scannez vos produits en rayon directement depuis votre smartphone ou tablette.", details: ["Scan code-barres mobile", "Synchronisation instantanée", "Mode hors-ligne disponible", "Compatible iOS & Android"] },
      { body: "Accélérez la saisie de vos livraisons grâce à la reconnaissance assistée. Blink identifie automatiquement les produits, pré-remplit les quantités et détecte les anomalies.", details: ["Reconnaissance automatique", "Pré-remplissage intelligent", "Détection d'anomalies", "Gain de temps significatif"] },
      { body: "Optimisez votre pouvoir d'achat en regroupant vos commandes. Blink Premium vous permet de consolider vos achats auprès de vos fournisseurs et d'obtenir de meilleures conditions tarifaires.", details: ["Consolidation des commandes", "Négociation facilitée", "Suivi fournisseurs centralisé", "Historique des achats"] },
      { body: "Gardez un œil sur votre pharmacie où que vous soyez. L'application mobile Blink Premium vous donne accès à vos ventes du jour, indicateurs clés, alertes stock et activité en temps réel.", details: ["Tableau de bord mobile", "Ventes en temps réel", "Indicateurs clés", "Notifications push"] },
      { body: "Blink Premium évolue avec votre métier. Notre équipe déploie régulièrement de nouvelles fonctionnalités, améliorations et intégrations — sans frais supplémentaires.", details: ["Mises à jour automatiques", "Roadmap partagée", "Suggestions communauté", "0 coût supplémentaire"] },
    ],
    ar: [
      { body: "انتقل إلى بلينك بريميوم دون فقدان أي بيانات. نقوم باستيراد عملائك ومورديك وجميع بياناتك بمرافقة فريق متخصص. الانتقال سلس وسريع ودون أي انقطاع في نشاطك.", details: ["استيراد العملاء والموردين", "الحفاظ الكامل على السجل", "مرافقة فريق بلينك", "ترحيل في أيام قليلة"] },
      { body: "واجهة مصممة للصيادلة وليس للمعلوميين. سيكون فريقك جاهزاً للعمل من اليوم الأول. تنقل واضح وإجراءات مباشرة وتدريب مدمج لكل متعاون.", details: ["واجهة بديهية", "تدريب إلكتروني مشمول", "دعم فوري 7/7", "بداية خلال 48 ساعة"] },
      { body: "تابع مخزونك في الوقت الفعلي وتعرف على الانحرافات فوراً. يزامن بلينك بريميوم مداخلك ومخارجك تلقائياً ويولّد تنبيهات إعادة التموين.", details: ["مخزون في الوقت الفعلي", "تنبيهات نفاد المخزون", "تاريخ الحركات", "تقارير تلقائية"] },
      { body: "أجرِ جردك دون مغادرة الرف. مع تطبيق بلينك المحمول، امسح منتجاتك مباشرة من هاتفك أو جهازك اللوحي. سريع ودقيق وبدون إعادة إدخال يدوي.", details: ["مسح الباركود عبر الجوال", "مزامنة فورية", "وضع عمل بدون إنترنت", "متوافق مع iOS وAndroid"] },
      { body: "سرّع إدخال تسليماتك بالتعرف المدعوم بالذكاء الاصطناعي. يتعرف بلينك تلقائياً على المنتجات ويملأ الكميات مسبقاً ويكتشف الانحرافات.", details: ["تعرف تلقائي", "ملء مسبق ذكي", "اكتشاف الانحرافات", "توفير وقت ملحوظ"] },
      { body: "حسّن قوتك الشرائية بتجميع طلباتك. يتيح لك بلينك بريميوم توحيد مشترياتك لدى مورديك والحصول على أسعار وشروط أفضل.", details: ["توحيد الطلبات", "تيسير التفاوض", "متابعة الموردين مركزياً", "سجل المشتريات"] },
      { body: "راقب صيدليتك من أي مكان. يتيح لك تطبيق بلينك المحمول الوصول إلى مبيعاتك اليومية والمؤشرات الرئيسية وتنبيهات المخزون في الوقت الفعلي.", details: ["لوحة قيادة جوالة", "مبيعات في الوقت الفعلي", "مؤشرات رئيسية", "إشعارات فورية"] },
      { body: "يتطور بلينك بريميوم مع مهنتك. يوزع فريقنا بانتظام ميزات جديدة وتحسينات وتكاملات — بدون أي تكاليف إضافية.", details: ["تحديثات تلقائية", "خارطة طريق مشتركة", "اقتراحات المجتمع", "صفر تكاليف إضافية"] },
    ],
    es: [
      { body: "Pasa a Blink Premium sin perder tu historial. Importamos tus clientes, proveedores y todos tus datos con acompañamiento personalizado. La transición es fluida, rápida y sin interrupciones.", details: ["Importación de clientes y proveedores", "Historial completo preservado", "Acompañamiento Blink dedicado", "Migración en pocos días"] },
      { body: "Una interfaz pensada para farmacéuticos, no para informáticos. Tu equipo estará operativo desde el primer día. Navegación clara, acciones directas y formación integrada.", details: ["Interfaz intuitiva", "Formación online incluida", "Soporte reactivo 7/7", "Arranque en 48h"] },
      { body: "Visualiza tu stock en tiempo real e identifica desviaciones inmediatamente. Blink Premium sincroniza entradas y salidas automáticamente y genera alertas de reabastecimiento.", details: ["Stock en tiempo real", "Alertas de rotura", "Historial de movimientos", "Informes automatizados"] },
      { body: "Realiza tus inventarios sin quedarte detrás del mostrador. Con la app móvil Blink, escanea tus productos directamente desde tu smartphone o tablet.", details: ["Escaneo de código de barras", "Sincronización instantánea", "Modo sin conexión", "Compatible iOS y Android"] },
      { body: "Acelera la entrada de entregas con reconocimiento asistido por IA. Blink identifica automáticamente los productos, prerellena cantidades y detecta anomalías.", details: ["Reconocimiento automático", "Relleno previo inteligente", "Detección de anomalías", "Ahorro de tiempo significativo"] },
      { body: "Optimiza tu poder adquisitivo agrupando pedidos. Blink Premium te permite consolidar compras con proveedores y obtener mejores condiciones tarifarias.", details: ["Consolidación de pedidos", "Negociación facilitada", "Seguimiento centralizado", "Historial de compras"] },
      { body: "Mantén el control de tu farmacia desde cualquier lugar. La app Blink Premium te da acceso a ventas diarias, indicadores clave, alertas de stock y actividad en tiempo real.", details: ["Panel de control móvil", "Ventas en tiempo real", "Indicadores clave", "Notificaciones push"] },
      { body: "Blink Premium evoluciona con tu negocio. Nuestro equipo despliega regularmente nuevas funcionalidades, mejoras e integraciones — sin coste adicional.", details: ["Actualizaciones automáticas", "Hoja de ruta compartida", "Sugerencias de la comunidad", "0 coste adicional"] },
    ],
    ru: [
      { body: "Перейдите на Blink Premium без потери истории. Мы импортируем ваших клиентов, поставщиков и все данные с персональным сопровождением. Переход плавный, быстрый и без перебоев в работе.", details: ["Импорт клиентов и поставщиков", "Полное сохранение истории", "Поддержка команды Blink", "Миграция за несколько дней"] },
      { body: "Интерфейс создан для фармацевтов, а не для IT-специалистов. Ваша команда будет готова к работе с первого дня. Чёткая навигация, прямые действия и встроенное обучение.", details: ["Интуитивный интерфейс", "Онлайн-обучение включено", "Поддержка 7/7", "Запуск за 48 часов"] },
      { body: "Отслеживайте запасы в реальном времени и мгновенно выявляйте расхождения. Blink Premium автоматически синхронизирует приходы и расходы, генерирует оповещения.", details: ["Склад в реальном времени", "Оповещения о нехватке", "История движений", "Автоматические отчёты"] },
      { body: "Проводите инвентаризацию, не выходя из торгового зала. С мобильным приложением Blink сканируйте товары прямо со смартфона или планшета.", details: ["Сканирование штрих-кода", "Мгновенная синхронизация", "Оффлайн-режим", "Совместимо с iOS и Android"] },
      { body: "Ускорьте ввод поставок с помощью ИИ-распознавания. Blink автоматически определяет товары, заполняет количества и обнаруживает отклонения.", details: ["Автоматическое распознавание", "Умное предзаполнение", "Обнаружение отклонений", "Значительная экономия времени"] },
      { body: "Оптимизируйте закупки, объединяя заказы. Blink Premium позволяет консолидировать покупки у поставщиков и получать лучшие условия.", details: ["Консолидация заказов", "Упрощённые переговоры", "Централизованное управление", "История закупок"] },
      { body: "Следите за аптекой из любого места. Мобильное приложение Blink Premium даёт доступ к дневным продажам, ключевым показателям и уведомлениям о запасах.", details: ["Мобильная панель управления", "Продажи в реальном времени", "Ключевые показатели", "Push-уведомления"] },
      { body: "Blink Premium развивается вместе с вашим бизнесом. Наша команда регулярно выпускает новые функции, улучшения и интеграции — без дополнительных затрат.", details: ["Автоматические обновления", "Общая дорожная карта", "Предложения сообщества", "0 дополнительных затрат"] },
    ],
  };

  const langSuffix = (lang === 'fr') ? '' : '-' + lang;
  const mediaFiles = [1,2,3,4,5,6,7,8].map(n => `blink-carte-0${n}${langSuffix}.jpg`);
  const icons      = ["🔄","⚡","📦","📱","🔍","🛒","📊","🚀"];

  const baseFeats = BI18N.features;
  const extra = FEAT_EXTRA[lang] || FEAT_EXTRA.fr;

  const FEATURES = baseFeats.map((f, i) => ({
    ...f,
    media: mediaFiles[i],
    icon:  icons[i],
    body:  extra[i].body,
    details: extra[i].details,
  }));

  // Anchor links
  const anchorLinks = document.getElementById('anchorLinks');
  FEATURES.forEach(f => {
    const a = document.createElement('a');
    a.href = `#${f.anchor}`;
    a.className = 'anchor-link';
    a.style.setProperty('--ac', f.color);
    a.textContent = f.title;
    anchorLinks.appendChild(a);
  });

  // Feature sections
  const container = document.getElementById('featureSections');
  FEATURES.forEach((f, i) => {
    const isFlip = i % 2 === 1;
    const section = document.createElement('section');
    section.className = `feature-section${isFlip ? ' flip' : ''}`;
    section.id = f.anchor;
    section.style.setProperty('--feat-color', f.color);

    const detailsHTML = f.details.map(d => `
      <div style="display:flex;align-items:center;gap:0.625rem;margin-bottom:0.5rem;">
        <span style="width:18px;height:18px;border-radius:50%;background:color-mix(in srgb,${f.color} 15%,white);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="10" height="10" viewBox="0 0 12 12"><polyline points="1,6 4,9 11,2" stroke="${f.color}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        <span style="font-size:0.875rem;color:#475569;">${d}</span>
      </div>
    `).join('');

    section.innerHTML = `
      <div class="feature-inner">
        <div class="feature-media fade-up">
          <span class="feature-number">${i + 1}</span>
          <div class="feature-card-frame">
            <div class="feature-card-header">
              <div class="feature-card-dot" style="background:${f.color};"></div>
              <div class="feature-card-dot" style="background:color-mix(in srgb,${f.color} 40%,#ddd);"></div>
              <span class="title">${f.title}</span>
            </div>
            <img src="${BASE}${f.media}" alt="Blink Premium — ${f.title}"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
            <div class="feature-card-placeholder" style="display:none;">
              <div class="ph-icon">${f.icon}</div>
              <span>${f.title}</span>
            </div>
          </div>
        </div>
        <div class="feature-content fade-up">
          <div class="feature-tag">${f.title}</div>
          <h2>${f.body.split('.')[0]}.</h2>
          <p>${f.body}</p>
          <div style="margin-bottom:1.75rem;">${detailsHTML}</div>
          <div class="feature-actions">
            <a href="${lq('contact.html')}" class="feat-btn feat-btn-primary">${t.feat_btn1}</a>
            <a href="${lq('contact.html')}" class="feat-btn feat-btn-secondary">${t.feat_btn2}</a>
          </div>
        </div>
      </div>
    `;
    container.appendChild(section);
  });

  if (typeof initScrollAnimations === 'function') initScrollAnimations();
  </script>

  <script>injectFooter();</script>
</body>
</html>
