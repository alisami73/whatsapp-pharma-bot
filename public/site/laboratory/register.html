<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Inscription Laboratoire — Blink Alertes</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#F4F7FB;--card:#fff;--surface:#F8FAFC;--green:#4CAF50;--teal:#26C6DA;--blue:#3F51B5;--amber:#FFC107;--text:#213547;--muted:#64748B;--soft:#94A3B8;--border:#E2E8F0;--shadow:0 8px 24px rgba(15,23,42,.08);--r-xl:24px;--r-lg:18px;--r-md:14px;--r-sm:10px;--nav-h:52px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;min-height:100vh;display:flex;flex-direction:column}
.nav{background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:var(--nav-h);padding:0 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,var(--green),var(--teal));display:flex;align-items:center;justify-content:center;font-family:"Nunito",sans-serif;font-weight:900;font-size:14px;color:#fff;flex-shrink:0}
.logo-text{font-family:"Nunito",sans-serif;font-weight:700;font-size:14px;color:var(--text)}
.logo-text strong{color:var(--green);font-weight:900}
.role-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:rgba(76,175,80,.12);color:var(--green);letter-spacing:.04em}
.avatar{width:30px;height:30px;border-radius:999px;background:linear-gradient(135deg,var(--green),var(--teal));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.wizard{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;flex-shrink:0}
.wstep{display:flex;flex-direction:column;align-items:center;gap:3px}
.wdot{width:22px;height:22px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;background:var(--border);color:var(--soft);flex-shrink:0}
.wdot.done{background:var(--green);color:#fff}
.wdot.active{background:var(--text);color:#fff}
.wlabel{font-size:9px;font-weight:700;color:var(--soft);white-space:nowrap}
.wlabel.active{color:var(--text)}
.wline{flex:1;height:2px;background:var(--border);margin:0 6px 12px}
.wline.done{background:var(--green)}
.shell{max-width:520px;margin:0 auto;padding:20px 16px 80px;width:100%}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;box-shadow:var(--shadow)}
.card-title{font-family:"Nunito",sans-serif;font-weight:800;font-size:13px;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.eyebrow{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);display:flex;align-items:center;gap:5px;margin-bottom:4px}
.eyebrow::before{content:"";width:6px;height:6px;border-radius:999px;background:linear-gradient(135deg,var(--green),var(--teal))}
.section-title{font-family:"Nunito",sans-serif;font-weight:900;font-size:20px;color:var(--text);letter-spacing:-.02em;margin-bottom:2px}
.subtitle{font-size:12px;color:var(--muted);margin-top:4px}
.fields{display:grid;gap:10px}
.fields.two{grid-template-columns:repeat(2,minmax(0,1fr))}
.field-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
input,select,textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--surface);padding:9px 11px;font:inherit;font-size:12px;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(76,175,80,.12)}
textarea{min-height:70px;resize:vertical}
.row-item{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--border)}
.row-item:last-child{border-bottom:none}
.check{width:17px;height:17px;border-radius:5px;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s}
.check.on{background:var(--green);border-color:var(--green)}
.check.on::after{content:"✓";font-size:10px;color:#fff;font-weight:900}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:700}
.badge-green{background:rgba(76,175,80,.12);color:#2E7D32}
.badge-teal{background:rgba(38,198,218,.12);color:#00838F}
.badge-amber{background:rgba(255,193,7,.14);color:#E65100}
.badge-blue{background:rgba(63,81,181,.1);color:#1A237E}
.badge-red{background:rgba(239,83,80,.1);color:#B71C1C}
.badge-gray{background:rgba(148,163,184,.15);color:var(--muted)}
.note{background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.25);border-radius:var(--r-sm);padding:10px 12px;font-size:11px;color:#8a5b00;line-height:1.5}
.wf-note{font-size:10px;color:var(--soft);font-style:italic;display:flex;align-items:flex-start;gap:4px;line-height:1.5}
.wf-note::before{content:"↳";font-style:normal;color:var(--teal);flex-shrink:0}
.upload-zone{border:2px dashed rgba(76,175,80,.4);border-radius:var(--r-lg);padding:18px;text-align:center;background:rgba(76,175,80,.04);display:flex;flex-direction:column;align-items:center;gap:6px}
.upload-icon{font-size:24px}
.upload-title{font-size:12px;font-weight:700;color:var(--text)}
.upload-sub{font-size:10px;color:var(--soft)}
.product-table{width:100%;border-collapse:collapse}
.th{font-size:10px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;background:var(--surface);text-align:left}
.td{font-size:11px;color:var(--text);padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:999px;cursor:pointer;padding:9px 18px;font-family:inherit;font-size:12px;font-weight:700;transition:transform .15s,box-shadow .15s;text-decoration:none;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-primary{color:#fff;background:linear-gradient(135deg,var(--green),#3FA95F);box-shadow:0 8px 20px rgba(76,175,80,.24)}
.btn-primary:hover:not(:disabled){transform:translateY(-1px)}
.btn-outline{color:var(--green);background:rgba(76,175,80,.08);border:1.5px solid rgba(76,175,80,.25)}
.btn-outline:hover:not(:disabled){background:rgba(76,175,80,.14)}
.btn-sm{padding:5px 12px!important;font-size:11px!important}
.btn-full{width:100%;padding:13px}
.step-nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
.step-nav.end{justify-content:flex-end}
.gap{display:flex;flex-direction:column;gap:10px}
.contact-card{background:rgba(76,175,80,.04);border:1px solid rgba(76,175,80,.18);border-radius:var(--r-md);padding:14px}
.success-box{text-align:center;padding:32px 20px}
.success-icon{font-size:48px;margin-bottom:12px}
.success-title{font-family:"Nunito",sans-serif;font-weight:900;font-size:22px;margin-bottom:8px}
.success-sub{color:var(--muted);font-size:13px;line-height:1.6}
.toast{position:fixed;right:16px;bottom:16px;padding:12px 16px;border-radius:14px;background:#122033;color:#fff;font-size:13px;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;box-shadow:0 8px 24px rgba(15,23,42,.2);z-index:200}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{background:#8c2333}
.hidden{display:none!important}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">
    <div class="logo-mark">B</div>
    <span class="logo-text">Blink <strong>Alertes</strong></span>
    <span class="role-badge">Laboratoire</span>
  </div>
  <div class="avatar">LB</div>
</nav>

<div class="wizard" id="wizardBar">
  <div class="wstep">
    <div class="wdot active" id="dot1">1</div>
    <span class="wlabel active" id="lbl1">Société</span>
  </div>
  <div class="wline" id="line1"></div>
  <div class="wstep">
    <div class="wdot" id="dot2">2</div>
    <span class="wlabel" id="lbl2">Produits</span>
  </div>
  <div class="wline" id="line2"></div>
  <div class="wstep">
    <div class="wdot" id="dot3">3</div>
    <span class="wlabel" id="lbl3">Validation</span>
  </div>
</div>

<div class="shell">
  <div id="mainContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let step = 1;
const state = {
  org: null,
  accessToken: null,
  cguAccepted: false,
  products: [],
  manualProducts: [],
  searchResults: [],
};

const main = document.getElementById('mainContent');

function toast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className='toast'+(isError?' error':''), 2800);
}

function updateWizard() {
  [1,2,3].forEach(i => {
    const dot = document.getElementById('dot'+i);
    const lbl = document.getElementById('lbl'+i);
    dot.className = 'wdot ' + (i < step ? 'done' : i === step ? 'active' : '');
    dot.textContent = i < step ? '✓' : i;
    lbl.className = 'wlabel' + (i === step ? ' active' : '');
  });
  [1,2].forEach(i => {
    const ln = document.getElementById('line'+i);
    if (ln) ln.className = 'wline' + (i < step ? ' done' : '');
  });
}

function goStep(n) { step = n; updateWizard(); renderStep(); window.scrollTo(0,0); }

function renderStep() {
  if (step === 1) renderSociete();
  else if (step === 2) renderProduits();
  else renderValidation();
}

/* ── Step 1: Société ── */
function renderSociete() {
  main.innerHTML = `
    <div style="margin-bottom:18px">
      <div class="eyebrow">Inscription laboratoire</div>
      <div class="section-title">Informations société</div>
      <p class="subtitle">Déclarez votre laboratoire et votre contact principal.</p>
    </div>
    <form id="societyForm" class="gap">
      <div class="fields two">
        <div>
          <div class="field-label">Raison sociale *</div>
          <input name="name" placeholder="Ex: Sanofi Maroc SA" required value="${esc(state.form_name||'')}"/>
        </div>
        <div>
          <div class="field-label">N° RC</div>
          <input name="registration_number" placeholder="123456" value="${esc(state.form_rc||'')}"/>
        </div>
      </div>
      <div class="fields two">
        <div>
          <div class="field-label">ICE</div>
          <input name="ice" placeholder="001234567000012" value="${esc(state.form_ice||'')}"/>
        </div>
        <div>
          <div class="field-label">Ville</div>
          <input name="city" placeholder="Casablanca" value="${esc(state.form_city||'')}"/>
        </div>
      </div>
      <div>
        <div class="field-label">Adresse complète</div>
        <input name="address" placeholder="Km 12 Route de Rabat, Ain Sebaâ..." value="${esc(state.form_address||'')}"/>
      </div>

      <div class="contact-card">
        <div class="card-title">👤 Contact principal</div>
        <div class="fields">
          <div class="fields two">
            <div>
              <div class="field-label">Prénom Nom *</div>
              <input name="contact_name" placeholder="Ahmed Benali" required value="${esc(state.form_contact_name||'')}"/>
            </div>
            <div>
              <div class="field-label">Poste</div>
              <input name="contact_role" placeholder="Dir. commercial" value="${esc(state.form_contact_role||'')}"/>
            </div>
          </div>
          <div>
            <div class="field-label">Email professionnel *</div>
            <input name="contact_email" type="email" placeholder="a.benali@labo.ma" required value="${esc(state.form_contact_email||'')}"/>
          </div>
          <div>
            <div class="field-label">Téléphone WhatsApp *</div>
            <input name="contact_phone" placeholder="+212 6XX XXX XXX" required value="${esc(state.form_contact_phone||'')}"/>
          </div>
        </div>
      </div>

      <div style="display:flex;align-items:flex-start;gap:10px">
        <div class="check ${state.cguAccepted?'on':''}" id="cguCheck" onclick="toggleCgu()" style="margin-top:1px;flex-shrink:0"></div>
        <span style="font-size:11px;line-height:1.6">J'accepte les <strong>conditions d'utilisation</strong> Blink Alertes</span>
      </div>

      <div class="step-nav end">
        <button class="btn btn-primary" type="submit" id="submitSociety">Suivant : Produits →</button>
      </div>
    </form>`;

  document.getElementById('societyForm').addEventListener('submit', handleSocietySubmit);
}

function toggleCgu() {
  state.cguAccepted = !state.cguAccepted;
  const el = document.getElementById('cguCheck');
  if (el) el.className = 'check ' + (state.cguAccepted ? 'on' : '');
}

async function handleSocietySubmit(e) {
  e.preventDefault();
  const fd = new FormData(e.currentTarget);
  const data = Object.fromEntries(fd.entries());

  // Save form values in state for back navigation
  Object.assign(state, {
    form_name: data.name, form_rc: data.registration_number,
    form_ice: data.ice, form_city: data.city, form_address: data.address,
    form_contact_name: data.contact_name, form_contact_role: data.contact_role,
    form_contact_email: data.contact_email, form_contact_phone: data.contact_phone,
  });

  if (!state.cguAccepted) { toast('Veuillez accepter les conditions d\'utilisation', true); return; }

  const btn = document.getElementById('submitSociety');
  btn.disabled = true; btn.textContent = 'Enregistrement…';

  try {
    const res = await fetch('/api/stock-alerts/laboratories/register', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        name: data.name,
        legal_name: data.name,
        registration_number: data.registration_number || data.ice || undefined,
        city: data.city,
        contact_name: data.contact_name,
        contact_role: data.contact_role || undefined,
        contact_email: data.contact_email,
        contact_phone: data.contact_phone,
      }),
    });
    const result = await res.json().catch(()=>({}));
    if (!res.ok) throw new Error(result.error || result.message || 'Inscription impossible');
    state.org = result.organization;
    state.accessToken = result.access_token;
    toast('Laboratoire enregistré');
    goStep(2);
  } catch(err) {
    toast(err.message, true);
    btn.disabled = false; btn.textContent = 'Suivant : Produits →';
  }
}

/* ── Step 2: Produits ── */
function renderProduits() {
  const rows = state.products.map(p => {
    const scoreClass = p.score >= 95 ? 'badge-green' : p.score > 0 ? 'badge-amber' : '';
    const statusBadge = p.match_status === 'validated'
      ? '<span class="badge badge-green">✓ Validé</span>'
      : p.match_status === 'pending_manual_review'
        ? '<span class="badge badge-amber">⚠ Révision</span>'
        : '<span class="badge badge-red">✗ Manquant</span>';
    return `<tr>
      <td class="td" style="font-weight:600">${esc(p.product_name)}</td>
      <td class="td" style="color:var(--muted)">${esc(p.product_id_medindex||'—')}</td>
      <td class="td">${p.score > 0 ? `<span class="badge ${scoreClass}">${p.score}%</span>` : ''}</td>
      <td class="td">${statusBadge}</td>
    </tr>`;
  }).join('');

  const manualRows = state.manualProducts.map((p,i) => `
    <div class="row-item">
      <span style="flex:1;font-size:12px;font-weight:600">${esc(p.product_name)}</span>
      <span style="font-size:11px;color:var(--muted)">${esc(p.product_id_medindex||'Sans MedIndex')}</span>
      <button class="btn btn-sm" style="color:var(--soft);background:none;border:none;font-size:16px;cursor:pointer" onclick="removeManual(${i})">×</button>
    </div>`).join('');

  main.innerHTML = `
    <div style="margin-bottom:18px">
      <div class="eyebrow">Catalogue produits</div>
      <div class="section-title">Import & matching Medindex</div>
      <p class="subtitle">Ajoutez vos produits pour activer les campagnes d'alertes.</p>
    </div>
    <div class="gap">
      <div class="upload-zone">
        <div class="upload-icon">📂</div>
        <div class="upload-title">Déposez votre fichier Excel / CSV ici</div>
        <div class="upload-sub">ou sélectionnez depuis la base Medindex</div>
        <input type="file" id="fileInput" accept=".csv,.txt,.tsv,.xlsx,.xls" style="display:none" onchange="handleFileUpload()"/>
        <div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;justify-content:center">
          <button class="btn btn-primary btn-sm" onclick="document.getElementById('fileInput').click()">📁 Importer fichier</button>
          <button class="btn btn-outline btn-sm" onclick="toggleSearch()">🔍 Parcourir Medindex</button>
        </div>
      </div>

      <div id="searchBlock" class="hidden">
        <div class="card">
          <div class="card-title">🔍 Recherche Medindex</div>
          <div style="display:flex;gap:8px">
            <input id="searchInput" placeholder="Nom produit ou DCI" style="flex:1" onkeydown="if(event.key==='Enter'){event.preventDefault();doSearch()}"/>
            <button class="btn btn-outline btn-sm" onclick="doSearch()">Rechercher</button>
          </div>
          <div id="searchResults" style="margin-top:10px"></div>
        </div>
      </div>

      <div>
        <div class="card-title" style="margin-bottom:8px">➕ Ajouter manuellement</div>
        <div style="display:flex;gap:8px;align-items:flex-end">
          <div style="flex:1">
            <div class="field-label">Nom du produit</div>
            <input id="manualName" placeholder="Ex: Doliprane 500mg"/>
          </div>
          <div style="flex:1">
            <div class="field-label">ID Medindex (optionnel)</div>
            <input id="manualMedindex" placeholder="MX-00421"/>
          </div>
          <button class="btn btn-outline btn-sm" onclick="addManual()" style="flex-shrink:0;margin-bottom:1px">Ajouter</button>
        </div>
        <div id="manualList" style="margin-top:10px">${manualRows || '<p style="font-size:12px;color:var(--muted);padding:4px 0">Aucun produit ajouté manuellement.</p>'}</div>
      </div>

      ${state.products.length ? `
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
          <span class="card-title" style="margin:0">Résultats du matching</span>
          <span class="badge badge-amber">${state.products.filter(p=>p.match_status==='pending_manual_review').length} à réviser</span>
        </div>
        <table class="product-table">
          <thead><tr>
            <th class="th">Produit importé</th>
            <th class="th">Correspondance Medindex</th>
            <th class="th">Score</th>
            <th class="th">Statut</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>` : ''}

      <div class="wf-note">Produits en révision soumis à validation manuelle Blink Admin avant tout envoi d'alerte.</div>
    </div>
    <div class="step-nav">
      <button class="btn btn-outline" onclick="goStep(1)">← Retour</button>
      <button class="btn btn-primary" id="submitProducts" onclick="handleProductsSubmit()">Soumettre pour validation →</button>
    </div>`;
}

function toggleSearch() {
  const el = document.getElementById('searchBlock');
  if (el) el.classList.toggle('hidden');
}

async function doSearch() {
  const q = (document.getElementById('searchInput')?.value||'').trim();
  const host = document.getElementById('searchResults');
  if (!q || !host) return;
  host.innerHTML = '<p style="font-size:12px;color:var(--muted)">Recherche…</p>';
  const res = await fetch('/api/stock-alerts/supplier/medindex/search?q=' + encodeURIComponent(q) + (state.accessToken ? '&access_token='+encodeURIComponent(state.accessToken) : ''));
  if (!res.ok) { host.innerHTML = '<p style="font-size:12px;color:var(--muted)">Recherche indisponible.</p>'; return; }
  const data = await res.json();
  const results = data.results || [];
  if (!results.length) { host.innerHTML = '<p style="font-size:12px;color:var(--muted)">Aucun résultat.</p>'; return; }
  state.searchResults = results;
  host.innerHTML = results.map((item, i) => `
    <div class="row-item">
      <span style="flex:1;font-size:12px;font-weight:600">${esc(item.name)}</span>
      <span style="font-size:11px;color:var(--muted)">${esc(item.dci||'')}</span>
      <button class="btn btn-outline btn-sm" onclick="addFromSearch(${i})">Ajouter</button>
    </div>`).join('');
}

function addFromSearch(i) {
  const item = state.searchResults[i];
  if (!item) return;
  state.manualProducts.push({ product_name: item.name, product_id_medindex: item.id || null });
  renderProduits();
}

function removeManual(i) {
  state.manualProducts.splice(i, 1);
  renderProduits();
}

function addManual() {
  const name = (document.getElementById('manualName')?.value||'').trim();
  const mid = (document.getElementById('manualMedindex')?.value||'').trim();
  if (!name) { toast('Saisissez un nom de produit', true); return; }
  state.manualProducts.push({ product_name: name, product_id_medindex: mid || null });
  renderProduits();
}

async function handleFileUpload() {
  const input = document.getElementById('fileInput');
  if (!input?.files?.[0]) return;
  const file = input.files[0];
  const btn = document.getElementById('submitProducts');
  if (btn) { btn.disabled = true; btn.textContent = 'Traitement…'; }
  try {
    let fileBase64 = null, text = null;
    if (/\.(xlsx|xls)$/i.test(file.name)) {
      const buf = await file.arrayBuffer();
      const bytes = new Uint8Array(buf);
      let bin = ''; const chunk = 0x8000;
      for (let idx = 0; idx < bytes.length; idx += chunk) bin += String.fromCharCode(...bytes.subarray(idx, idx+chunk));
      fileBase64 = btoa(bin);
    } else {
      text = await file.text();
    }
    const url = '/api/stock-alerts/supplier/products/upload' + (state.accessToken ? '?access_token='+encodeURIComponent(state.accessToken) : '');
    const res = await fetch(url, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ filename: file.name, file_text: text, file_base64: fileBase64, mime_type: file.type||'text/csv', file_size_bytes: file.size }),
    });
    const result = await res.json().catch(()=>({}));
    if (!res.ok) throw new Error(result.error || 'Import impossible');
    toast('Import traité');
    await refreshContext();
  } catch(err) { toast(err.message, true); }
  finally { if (btn) { btn.disabled = false; btn.textContent = 'Soumettre pour validation →'; } }
}

async function refreshContext() {
  if (!state.accessToken) return;
  const res = await fetch('/api/stock-alerts/supplier/context?access_token=' + encodeURIComponent(state.accessToken));
  if (res.ok) {
    const ctx = await res.json();
    state.products = ctx.products || [];
  }
  renderProduits();
}

async function handleProductsSubmit() {
  if (!state.manualProducts.length && !state.products.length) {
    goStep(3); return;
  }
  if (state.manualProducts.length) {
    const btn = document.getElementById('submitProducts');
    if (btn) { btn.disabled = true; btn.textContent = 'Enregistrement…'; }
    try {
      const url = '/api/stock-alerts/supplier/products/manual' + (state.accessToken ? '?access_token='+encodeURIComponent(state.accessToken) : '');
      const res = await fetch(url, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ products: state.manualProducts }),
      });
      const result = await res.json().catch(()=>({}));
      if (!res.ok) throw new Error(result.error || 'Ajout impossible');
      toast('Produits enregistrés');
      state.manualProducts = [];
    } catch(err) {
      toast(err.message, true);
      if (btn) { btn.disabled = false; btn.textContent = 'Soumettre pour validation →'; }
      return;
    }
  }
  goStep(3);
}

/* ── Step 3: Validation ── */
function renderValidation() {
  const orgName = state.org?.name || state.form_name || 'Votre laboratoire';
  document.getElementById('wizardBar').querySelectorAll('.wdot').forEach((d,i) => {
    d.className = 'wdot done'; d.textContent = '✓';
  });
  document.getElementById('wizardBar').querySelectorAll('.wline').forEach(l => l.className='wline done');
  main.innerHTML = `
    <div class="card success-box">
      <div class="success-icon">✅</div>
      <div class="success-title">Demande soumise</div>
      <p class="success-sub"><strong>${esc(orgName)}</strong> a été enregistré.<br>Votre dossier est en attente de validation Blink Admin (24–48h).<br>Un email de confirmation vous sera envoyé.</p>
      <div style="margin-top:16px;display:flex;flex-direction:column;gap:8px;align-items:center">
        ${state.accessToken ? `<a class="btn btn-primary" href="/supplier/alerts/new?access_token=${encodeURIComponent(state.accessToken)}">Ouvrir le composeur d'alertes</a>` : ''}
        <a class="btn btn-outline" href="/actu.html">Voir les actualités Blink</a>
      </div>
    </div>
    <div class="note" style="margin-top:12px">⏱ Validation Blink Admin sous 24–48h. Un email de confirmation vous sera envoyé à <strong>${esc(state.form_contact_email||'')}</strong>.</div>`;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Init
renderSociete();
</script>
