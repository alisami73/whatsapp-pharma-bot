    .page-hero {
      position: relative;

      padding: 5.5rem 2rem 4rem;
      border-bottom: 1px solid var(--blink-border);
      text-align: center;
    }
    .page-hero::after {
      content: '';
      position: absolute;
      inset: auto 8% 1.5rem;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(76, 175, 80, 0.35), transparent);
    }
    .page-hero h1 {
      font-size: clamp(2rem, 4.5vw, 3.2rem);
      font-weight: 900;
      margin-bottom: 1rem;
    }
    .page-hero p {
      max-width: 720px;
      margin: 0 auto;
      color: #64748b;
      font-size: 1.03rem;
    }
    .hero-badges {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 2rem;
    }
    .hero-badge {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--blink-border);
      border-radius: 999px;
      padding: 0.6rem 1rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: #475569;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .content-shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 4rem 2rem 5rem;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.25rem;
      margin-bottom: 2.25rem;
    }
    .summary-card {
      position: relative;
      overflow: hidden;
      background: white;
      border-radius: 26px;
      border: 1px solid rgba(226, 232, 240, 0.92);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.06);
      padding: 1.5rem;
      min-height: 200px;
    }
    .summary-card::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: var(--accent, var(--blink-green));
    }
    .summary-card .summary-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: color-mix(in srgb, var(--accent, var(--blink-green)) 12%, white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.45rem;
      margin-bottom: 1rem;
    }
    .summary-card h2 {
      font-size: 1.18rem;
      font-weight: 800;
      margin-bottom: 0.65rem;
    }
    .summary-card p {
      color: #64748b;
      font-size: 0.92rem;
      line-height: 1.72;
    }

    .faq-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.9fr) minmax(280px, 0.95fr);
      gap: 1.5rem;
      align-items: start;
    }
    .faq-panel,
    .meta-card {
      background: white;
      border-radius: 28px;
      border: 1px solid rgba(226, 232, 240, 0.92);
      box-shadow: 0 18px 46px rgba(15, 23, 42, 0.06);
    }
    .faq-panel {
      padding: 2rem;
    }
    .faq-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .faq-header h2 {
      font-size: 1.5rem;
      font-weight: 800;
    }
    .faq-header p {
      color: #64748b;
      max-width: 560px;
      font-size: 0.95rem;
    }

    .faq-list {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    .faq-item {
      border: 1px solid var(--blink-border);
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      overflow: hidden;
    }
    .faq-question {
      width: 100%;
      border: none;
      background: transparent;
      padding: 1.15rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      text-align: left;
      cursor: pointer;
      font: inherit;
      color: inherit;
    }
    .faq-question strong {
      font-size: 0.97rem;
      font-weight: 700;
      line-height: 1.45;
    }
    .faq-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--blink-green) 10%, white);
      color: var(--blink-green);
      flex-shrink: 0;
      transition: transform 0.2s ease;
      font-size: 1rem;
    }
    .faq-item.open .faq-pill {
      transform: rotate(45deg);
    }
    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }
    .faq-answer-inner {
      padding: 0 1.25rem 1.2rem;
      color: #64748b;
      font-size: 0.92rem;
      line-height: 1.72;
    }

    .meta-stack {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .meta-card {
      padding: 1.5rem;
    }
    .meta-card h3 {
      font-size: 1.08rem;
      font-weight: 800;
      margin-bottom: 0.65rem;
    }
    .meta-card p {
      color: #64748b;
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 1rem;
    }
    .meta-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .meta-list-item {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      padding: 0.8rem 0;
      border-bottom: 1px solid var(--blink-border);
    }
    .meta-list-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .meta-list-item .dot {
      width: 10px;
      height: 10px;
      margin-top: 0.45rem;
      border-radius: 50%;
      background: var(--blink-green);
      flex-shrink: 0;
    }
    .meta-list-item span {
      color: #475569;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .meta-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 16px;
      background: linear-gradient(135deg, #4caf50 0%, #26c6da 100%);
      color: white;
      font-weight: 700;
      font-size: 0.95rem;
      box-shadow: 0 16px 28px rgba(76, 175, 80, 0.2);
    }

    @media (max-width: 980px) {
      .summary-grid,
      .faq-layout {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 680px) {
      .page-hero,
      .content-shell {
        padding-left: 1.25rem;
        padding-right: 1.25rem;
      }
      .faq-panel,
      .meta-card,
      .summary-card {
        border-radius: 22px;
      }
      .faq-panel {

      }
      .faq-question {

      .faq-answer-inner {

          { q: 'Lorem ipsum — какие меры безопасности применяются?', a: 'Vivamus et commodo nisi. Nulla facilisi. Pellentesque in dui vitae velit facilisis faucibus sit amet nec risus. Демонстрационный контент до финального наполнения.' },
          { q: 'Lorem ipsum — как запросить доступ или исправление данных?', a: 'Aliquam erat volutpat. Cras congue libero ut dui porta, ac dignissim lectus convallis. Этот блок служит примером структуры ответа.' }
        ],
        guideLabel: 'Ориентиры',
        guideTitle: 'Как использовать страницу',
        guideText: 'Структура уже готова для финального контента. Вы сможете заменить временные блоки утверждёнными ответами.',
        guideItems: [
          'Добавить официальные ответы по каждому вопросу.',
          'Сохранить этот макет для визуальной согласованности с остальным сайтом.',
          'Использовать прямую ссылку из WhatsApp, чтобы направлять пользователей к этой FAQ.'
        ],
        contactLabel: 'Контакт',
        contactTitle: 'Выделенный канал',
        contactText: 'Позже этот блок можно заменить контактом DPO, команды compliance или более подробной формой.',
        contactCta: 'Связаться по вопросам данных'
      }
    };

    const copy = COPY[lang] || COPY.fr;

    document.title = `${copy.title} — Blink Premium`;
    document.getElementById('heroLabel').textContent = copy.heroLabel;
    document.getElementById('heroTitle').textContent = copy.title;
    document.getElementById('heroText').textContent = copy.heroText;
    document.getElementById('faqLabel').textContent = copy.faqLabel;
    document.getElementById('faqTitle').textContent = copy.faqTitle;
    document.getElementById('faqText').textContent = copy.faqText;
    document.getElementById('guideLabel').textContent = copy.guideLabel;
    document.getElementById('guideTitle').textContent = copy.guideTitle;
    document.getElementById('guideText').textContent = copy.guideText;
    document.getElementById('contactLabel').textContent = copy.contactLabel;
    document.getElementById('contactTitle').textContent = copy.contactTitle;
    document.getElementById('contactText').textContent = copy.contactText;
    document.getElementById('contactCta').textContent = copy.contactCta;
    document.getElementById('contactCta').href = 'mailto:dpo@blink.ma';

    const heroBadges = document.getElementById('heroBadges');
    copy.badges.forEach((badge) => {
      const span = document.createElement('span');
      span.className = 'hero-badge';
      span.textContent = badge;
      heroBadges.appendChild(span);
    });

    const summaryGrid = document.getElementById('summaryGrid');
    copy.summaries.forEach((item, index) => {
      const article = document.createElement('article');
      article.className = 'summary-card fade-up';
      article.dataset.delay = String(index * 70);
      article.style.setProperty('--accent', item.accent);
      article.innerHTML = `
        <div class="summary-icon">${item.icon}</div>
        <h2>${item.title}</h2>
        <p>${item.text}</p>
      `;
      summaryGrid.appendChild(article);
    });

    const faqList = document.getElementById('faqList');
    copy.faq.forEach((entry, index) => {
      const article = document.createElement('article');
      article.className = 'faq-item';
      article.innerHTML = `
        <button class="faq-question" type="button" aria-expanded="false">
          <strong>${entry.q}</strong>
          <span class="faq-pill">+</span>
        </button>
        <div class="faq-answer">
          <div class="faq-answer-inner">${entry.a}</div>
        </div>
      `;

      const button = article.querySelector('.faq-question');
      const answer = article.querySelector('.faq-answer');

      if (index === 0) {
        article.classList.add('open');
        button.setAttribute('aria-expanded', 'true');
        answer.style.maxHeight = `${answer.scrollHeight}px`;
      }

      button.addEventListener('click', () => {
        const isOpen = article.classList.contains('open');
        article.classList.toggle('open', !isOpen);
        button.setAttribute('aria-expanded', String(!isOpen));
        answer.style.maxHeight = isOpen ? '0px' : `${answer.scrollHeight}px`;
      });

      faqList.appendChild(article);
    });

    const guideList = document.getElementById('guideList');
    copy.guideItems.forEach((item) => {
      const row = document.createElement('div');
      row.className = 'meta-list-item';
      row.innerHTML = `<span class="dot"></span><span>${item}</span>`;
      guideList.appendChild(row);
    });

    injectFooter();

    if (isRtl) {
      document.querySelectorAll('.faq-question').forEach((button) => {
        button.style.textAlign = 'right';
      });
    }
  </script>
</body>
</html>
