<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Préférences Alertes Stock — Blink</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#F4F7FB;--card:#fff;--surface:#F8FAFC;--green:#4CAF50;--teal:#26C6DA;--blue:#3F51B5;--amber:#FFC107;--text:#213547;--muted:#64748B;--soft:#94A3B8;--border:#E2E8F0;--shadow:0 8px 24px rgba(15,23,42,.08);--r-xl:24px;--r-lg:18px;--r-md:14px;--r-sm:10px;--nav-h:52px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;min-height:100vh;display:flex;flex-direction:column}
/* Nav */
.nav{background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:var(--nav-h);padding:0 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,var(--green),var(--teal));display:flex;align-items:center;justify-content:center;font-family:"Nunito",sans-serif;font-weight:900;font-size:14px;color:#fff;flex-shrink:0}
.logo-text{font-family:"Nunito",sans-serif;font-weight:700;font-size:14px;color:var(--text)}
.logo-text strong{color:var(--green);font-weight:900}
.role-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:rgba(76,175,80,.12);color:var(--green);letter-spacing:.04em}
.avatar{width:30px;height:30px;border-radius:999px;background:linear-gradient(135deg,var(--green),var(--teal));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
/* Wizard */
.wizard{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;flex-shrink:0}
.wstep{display:flex;flex-direction:column;align-items:center;gap:3px}
.wdot{width:22px;height:22px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;background:var(--border);color:var(--soft);flex-shrink:0}
.wdot.done{background:var(--green);color:#fff}
.wdot.active{background:var(--text);color:#fff}
.wlabel{font-size:9px;font-weight:700;color:var(--soft);white-space:nowrap}
.wlabel.active{color:var(--text)}
.wline{flex:1;height:2px;background:var(--border);margin:0 6px 12px}
.wline.done{background:var(--green)}
/* Shell */
.shell{max-width:520px;margin:0 auto;padding:20px 16px 80px;width:100%}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;box-shadow:var(--shadow)}
.card-title{font-family:"Nunito",sans-serif;font-weight:800;font-size:13px;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.eyebrow{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--soft);display:flex;align-items:center;gap:5px;margin-bottom:4px}
.eyebrow::before{content:"";width:6px;height:6px;border-radius:999px;background:linear-gradient(135deg,var(--green),var(--teal))}
.section-title{font-family:"Nunito",sans-serif;font-weight:900;font-size:20px;color:var(--text);letter-spacing:-.02em;margin-bottom:2px}
.subtitle{font-size:12px;color:var(--muted);margin-top:4px}
/* Row items */
.row-item{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--border)}
.row-item:last-child{border-bottom:none;padding-bottom:0}
/* Check */
.check{width:17px;height:17px;border-radius:5px;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s}
.check.on{background:var(--green);border-color:var(--green)}
.check.on::after{content:"✓";font-size:10px;color:#fff;font-weight:900}
/* Toggle */
.toggle-wrap{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r-md);border:1px solid var(--border);background:#fff;cursor:pointer;transition:background .15s}
.toggle-wrap:hover{background:var(--surface)}
.cat-icon{font-size:20px;flex-shrink:0}
.cat-text{flex:1}
.cat-label{font-size:12px;font-weight:700}
.cat-desc{font-size:10px;color:var(--muted)}
.toggle{width:36px;height:20px;border-radius:999px;background:var(--border);position:relative;flex-shrink:0;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--green)}
.toggle-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:999px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:transform .2s}
.toggle.on .toggle-knob{transform:translateX(16px)}
/* Badge */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:700}
.badge-green{background:rgba(76,175,80,.12);color:#2E7D32}
.badge-teal{background:rgba(38,198,218,.12);color:#00838F}
.badge-blue{background:rgba(63,81,181,.1);color:#1A237E}
.badge-gray{background:rgba(148,163,184,.15);color:var(--muted)}
/* Note */
.note{background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.25);border-radius:var(--r-sm);padding:10px 12px;font-size:11px;color:#8a5b00;line-height:1.5}
.info-box{background:rgba(63,81,181,.04);border:1px solid rgba(63,81,181,.15);border-radius:var(--r-sm);padding:12px 14px}
/* Consent */
.consent-box{background:rgba(63,81,181,.04);border:1px solid rgba(63,81,181,.15);border-radius:var(--r-md);padding:14px}
.consent-text{font-size:11px;line-height:1.7;color:var(--muted);margin:6px 0}
.consent-meta{font-size:10px;color:var(--soft);font-family:monospace;margin-top:8px}
.consent-check{display:flex;align-items:flex-start;gap:10px;margin-top:4px}
.consent-check span{font-size:11px;line-height:1.6}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:999px;cursor:pointer;padding:10px 20px;font-family:inherit;font-size:13px;font-weight:700;transition:transform .15s,box-shadow .15s;text-decoration:none;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-primary{color:#fff;background:linear-gradient(135deg,var(--green),#3FA95F);box-shadow:0 8px 20px rgba(76,175,80,.24)}
.btn-primary:hover:not(:disabled){transform:translateY(-1px)}
.btn-outline{color:var(--green);background:rgba(76,175,80,.08);border:1.5px solid rgba(76,175,80,.25)}
.btn-outline:hover:not(:disabled){background:rgba(76,175,80,.14)}
.btn-full{width:100%;padding:13px}
/* Nav between steps */
.step-nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
.step-nav.end{justify-content:flex-end}
/* Toast */
.toast{position:fixed;right:16px;bottom:16px;padding:12px 16px;border-radius:14px;background:#122033;color:#fff;font-size:13px;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;box-shadow:0 8px 24px rgba(15,23,42,.2);z-index:200}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{background:#8c2333}
/* Gap utility */
.gap{display:flex;flex-direction:column;gap:10px}
/* Success */
.success-box{text-align:center;padding:32px 20px}
.success-icon{font-size:48px;margin-bottom:12px}
.success-title{font-family:"Nunito",sans-serif;font-weight:900;font-size:22px;margin-bottom:8px}
.success-sub{color:var(--muted);font-size:13px;line-height:1.6}
/* Loading */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">
    <div class="logo-mark">B</div>
    <span class="logo-text">Blink <strong>Alertes</strong></span>
    <span class="role-badge">Pharmacien</span>
  </div>
  <div class="avatar" id="avatarEl">PH</div>
</nav>

<div class="wizard" id="wizardBar">
  <div class="wstep">
    <div class="wdot active" id="dot1">1</div>
    <span class="wlabel active" id="lbl1">Sources</span>
  </div>
  <div class="wline" id="line1"></div>
  <div class="wstep">
    <div class="wdot" id="dot2">2</div>
    <span class="wlabel" id="lbl2">Catégories</span>
  </div>
  <div class="wline" id="line2"></div>
  <div class="wstep">
    <div class="wdot" id="dot3">3</div>
    <span class="wlabel" id="lbl3">Confirmation</span>
  </div>
</div>

<div class="shell">
  <div id="mainContent"><div class="loading">Chargement…</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATEGORY_META = {
  stock_recovery:  { icon:'📦', label:'Retour en stock',     desc:'Médicament de nouveau disponible',        defaultOn:true  },
  out_of_stock:    { icon:'⚠️', label:'Rupture de stock',     desc:'Produit indisponible chez un grossiste',  defaultOn:true  },
  product_recall:  { icon:'🚨', label:'Rappel produit',       desc:'Alerte sécurité / retrait de lot',        defaultOn:true  },
  new_product:     { icon:'✨', label:'Nouveau produit',       desc:'Nouvelle référence Medindex',             defaultOn:false },
  regulatory_info: { icon:'📋', label:'Info réglementaire',   desc:'Circulaires, prix, AMM',                  defaultOn:false },
};

let step = 1;
let apiData = null;
let selectedSources = new Set();
let selectedCategories = new Set();
let consentAgreed = false;

const main = document.getElementById('mainContent');

function toast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className='toast'+(isError?' error':''), 2800);
}

function updateWizard() {
  [1,2,3].forEach(i => {
    const dot = document.getElementById('dot'+i);
    const lbl = document.getElementById('lbl'+i);
    dot.className = 'wdot ' + (i < step ? 'done' : i === step ? 'active' : '');
    dot.textContent = i < step ? '✓' : i;
    lbl.className = 'wlabel' + (i === step ? ' active' : '');
  });
  [1,2].forEach(i => {
    const ln = document.getElementById('line'+i);
    if (ln) ln.className = 'wline' + (i < step ? ' done' : '');
  });
}

function goStep(n) { step = n; updateWizard(); renderStep(); window.scrollTo(0,0); }

function renderStep() {
  if (!apiData) return;
  if (step === 1) renderSources();
  else if (step === 2) renderCategories();
  else renderConfirm();
}

function toggleSource(id) {
  selectedSources.has(id) ? selectedSources.delete(id) : selectedSources.add(id);
  renderSources();
}

function toggleCategory(key) {
  selectedCategories.has(key) ? selectedCategories.delete(key) : selectedCategories.add(key);
  renderCategories();
}

function renderSources() {
  const sources = apiData.sources || [];
  const wholesalers = sources.filter(s => s.source_type === 'wholesaler');
  const labs = sources.filter(s => s.source_type === 'laboratory');

  function sourceRows(list) {
    if (!list.length) return '<p style="font-size:12px;color:var(--muted);padding:4px 0">Aucune source disponible</p>';
    return list.map(s => {
      const on = selectedSources.has(s.source_id);
      const active = s.status === 'validated';
      return `<div class="row-item" onclick="toggleSource('${s.source_id}')">
        <div class="check ${on?'on':''}"></div>
        <span style="flex:1;font-size:12px;font-weight:${on?700:400}">${s.name}</span>
        <span class="badge ${active?'badge-green':'badge-gray'}">${active?'Actif':'Inactif'}</span>
      </div>`;
    }).join('');
  }

  main.innerHTML = `
    <div style="margin-bottom:18px">
      <div class="eyebrow">Préférences alertes WhatsApp</div>
      <div class="section-title">Choisissez vos sources</div>
      <p class="subtitle">Seuls les partenaires que vous sélectionnez pourront vous envoyer des alertes.</p>
    </div>
    <div class="gap">
      ${wholesalers.length ? `<div class="card"><div class="card-title">🏭 Grossistes répartiteurs</div>${sourceRows(wholesalers)}</div>` : ''}
      ${labs.length ? `<div class="card"><div class="card-title">🔬 Laboratoires</div>${sourceRows(labs)}</div>` : ''}
      ${!wholesalers.length && !labs.length ? `<div class="card" style="text-align:center;padding:28px"><p style="color:var(--muted);font-size:13px">Aucune source validée pour le moment.<br>Les laboratoires et grossistes apparaîtront ici dès leur validation.</p></div>` : ''}
      <div class="note">Les partenaires <strong>Inactifs</strong> sont en cours de validation par Blink Admin.</div>
    </div>
    <div class="step-nav end">
      <button class="btn btn-primary" onclick="goStep(2)">Suivant →</button>
    </div>`;
}

function renderCategories() {
  const cats = Object.entries(CATEGORY_META);
  const rows = cats.map(([key, meta]) => {
    const on = selectedCategories.has(key);
    return `<div class="toggle-wrap" onclick="toggleCategory('${key}')">
      <span class="cat-icon">${meta.icon}</span>
      <div class="cat-text">
        <div class="cat-label">${meta.label}</div>
        <div class="cat-desc">${meta.desc}</div>
      </div>
      <div class="toggle ${on?'on':''}"><div class="toggle-knob"></div></div>
    </div>`;
  }).join('');

  main.innerHTML = `
    <div style="margin-bottom:18px">
      <div class="eyebrow">Catégories d'alertes</div>
      <div class="section-title">Que voulez-vous recevoir ?</div>
      <p class="subtitle">Ces réglages s'appliquent à toutes vos sources autorisées.</p>
    </div>
    <div class="gap">${rows}</div>
    <div class="info-box" style="margin-top:10px">
      <strong style="font-size:11px">Granularité avancée</strong>
      <p style="font-size:10px;color:var(--muted);margin-top:2px">Vous pourrez affiner par source individuellement depuis votre tableau de bord.</p>
    </div>
    <div class="step-nav">
      <button class="btn btn-outline" onclick="goStep(1)">← Retour</button>
      <button class="btn btn-primary" onclick="goStep(3)">Suivant →</button>
    </div>`;
}

function renderConfirm() {
  const sources = apiData.sources || [];
  const selSrc = sources.filter(s => selectedSources.has(s.source_id));
  const gros = selSrc.filter(s => s.source_type === 'wholesaler');
  const labs = selSrc.filter(s => s.source_type === 'laboratory');
  const cats = [...selectedCategories].map(k => CATEGORY_META[k]).filter(Boolean);
  const version = apiData.consent_text_version || '1.2';

  const catBadges = cats.map(m => `<span class="badge badge-green" style="font-size:11px">${m.icon} ${m.label}</span>`).join('');
  const now = new Date().toLocaleDateString('fr-MA');

  main.innerHTML = `
    <div style="margin-bottom:18px">
      <div class="eyebrow">Récapitulatif</div>
      <div class="section-title">Votre consentement</div>
    </div>
    <div class="gap">
      <div class="card">
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
          ${gros.length ? `<span class="badge badge-green">${gros.length} grossiste${gros.length>1?'s':''}</span>` : ''}
          ${labs.length ? `<span class="badge badge-teal">${labs.length} laboratoire${labs.length>1?'s':''}</span>` : ''}
          <span class="badge badge-blue">${cats.length} catégorie${cats.length>1?'s':''}</span>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">${catBadges}</div>
      </div>
      <div class="consent-box">
        <div style="font-size:12px;font-weight:700;color:var(--blue);margin-bottom:4px">Texte de consentement v${version}</div>
        <p class="consent-text">En confirmant, vous autorisez les partenaires sélectionnés à vous envoyer des alertes WhatsApp professionnelles via Blink Pharma. Vous pouvez révoquer à tout moment en répondant <strong>STOP</strong> ou en modifiant vos préférences.</p>
        <div class="consent-meta" id="consentMeta">IP: … · Agent: … · v${version} · ${now}</div>
      </div>
      <div class="consent-check">
        <div class="check ${consentAgreed?'on':''}" id="consentCheck" onclick="toggleConsent()" style="margin-top:1px;flex-shrink:0"></div>
        <span>J'accepte de recevoir des alertes WhatsApp professionnelles de la part des partenaires sélectionnés.</span>
      </div>
      <button class="btn btn-primary btn-full" id="confirmBtn" onclick="submitPreferences()" ${consentAgreed?'':'disabled'}>✓ Confirmer mes préférences</button>
      <div class="note">Consentement enregistré côté serveur avec horodatage, IP, user-agent et version du texte.</div>
    </div>
    <div class="step-nav" style="margin-top:0">
      <button class="btn btn-outline" onclick="goStep(2)">← Retour</button>
    </div>`;

  // Fill in actual IP/agent info
  fetch('/api/stock-alerts/preferences').then(r=>r.json()).catch(()=>{});
  const metaEl = document.getElementById('consentMeta');
  if (metaEl) metaEl.textContent = `IP: — · Agent: ${navigator.userAgent.split(' ').slice(-1)[0]} · v${version} · ${now}`;
}

function toggleConsent() {
  consentAgreed = !consentAgreed;
  const check = document.getElementById('consentCheck');
  const btn = document.getElementById('confirmBtn');
  if (check) check.className = 'check ' + (consentAgreed ? 'on' : '');
  if (btn) btn.disabled = !consentAgreed;
}

async function submitPreferences() {
  if (!consentAgreed) return;
  const btn = document.getElementById('confirmBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Enregistrement…'; }

  const sources = apiData.sources || [];
  const preferences = [];
  for (const s of sources) {
    if (!selectedSources.has(s.source_id)) continue;
    for (const cat of selectedCategories) {
      preferences.push({ source_type: s.source_type, source_id: s.source_id, category: cat });
    }
  }

  try {
    const res = await fetch('/api/stock-alerts/preferences', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ consent_text_version: apiData.consent_text_version, preferences }),
    });
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error || 'Échec de la sauvegarde');
    }
    showSuccess();
  } catch(e) {
    toast(e.message, true);
    if (btn) { btn.disabled = false; btn.textContent = '✓ Confirmer mes préférences'; }
  }
}

function showSuccess() {
  document.getElementById('wizardBar').style.display = 'none';
  main.innerHTML = `
    <div class="card success-box">
      <div class="success-icon">✅</div>
      <div class="success-title">Préférences enregistrées</div>
      <p class="success-sub">Vos autorisations ont été sauvegardées.<br>Vous recevrez uniquement les alertes des sources et catégories sélectionnées.</p>
      <p style="margin-top:16px;font-size:12px;color:var(--muted)">Répondez <strong>STOP</strong> à tout moment sur WhatsApp pour révoquer.</p>
    </div>`;
}

function showUnauthorized() {
  document.getElementById('wizardBar').style.display = 'none';
  main.innerHTML = `
    <div class="card" style="text-align:center;padding:32px">
      <div style="font-size:40px;margin-bottom:12px">🔒</div>
      <h3 style="font-family:Nunito,sans-serif;font-size:18px;margin-bottom:8px">Lien sécurisé requis</h3>
      <p style="color:var(--muted);font-size:13px;line-height:1.6;max-width:42ch;margin:0 auto 18px">Cette page s'ouvre depuis un accès sécurisé envoyé par Blink. Demandez l'activation des alertes à votre interlocuteur Blink.</p>
      <a href="/actu.html" class="btn btn-outline">Voir la page actu</a>
    </div>`;
}

async function init() {
  try {
    const res = await fetch('/api/stock-alerts/preferences');
    if (res.status === 401) { showUnauthorized(); return; }
    if (!res.ok) throw new Error('Erreur serveur');
    apiData = await res.json();

    // Init selected sources
    const activeSrcs = new Set((apiData.preferences||[]).filter(p=>p.status==='active').map(p=>p.source_id));
    if (activeSrcs.size > 0) selectedSources = activeSrcs;
    else (apiData.sources||[]).forEach(s => selectedSources.add(s.source_id));

    // Init selected categories
    const activeCats = new Set((apiData.preferences||[]).filter(p=>p.status==='active').map(p=>p.category));
    if (activeCats.size > 0) selectedCategories = activeCats;
    else Object.entries(CATEGORY_META).forEach(([k,m]) => { if (m.defaultOn) selectedCategories.add(k); });

    // Set avatar initials
    const ph = apiData.pharmacist;
    if (ph && ph.name) {
      const parts = String(ph.name).trim().split(/\s+/);
      document.getElementById('avatarEl').textContent = parts.map(p=>p[0]).join('').toUpperCase().slice(0,2) || 'PH';
    }

    renderSources();
  } catch(e) {
    main.innerHTML = `<div class="card" style="text-align:center;padding:28px;color:var(--muted)">${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
